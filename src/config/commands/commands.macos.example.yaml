pads:
  # --- Tipo simple: ejecuta un comando de sistema ---

  36:
    name: "Terminal"
    type: simple
    command: "open -a Terminal"

  37:
    name: "Navegador"
    type: simple
    command: "open -a 'Google Chrome'"

  38:
    name: "Música"
    type: simple
    command: "open -a Spotify"

  39:
    name: "Bloquear pantalla"
    type: simple
    command: "pmset displaysleepnow"

  # --- Tipo sequence: ejecuta pasos en orden ---

  # Acciones disponibles:
  #   open      → abre una app o comando  (campo: app)
  #   close_all → cierra todas las ventanas abiertas
  #   notify    → notificación de SO sin sonido  (campo: message)
  #   delay     → espera N segundos  (campo: seconds)
  #   shell     → ejecuta un comando arbitrario  (campo: command)

  40:
    name: "Modo trabajo"
    type: sequence
    steps:
      - action: close_all
      - action: open
        app: "open -a Terminal"
      - action: delay
        seconds: 1
      - action: open
        app: "open -a 'Visual Studio Code'"
      - action: notify
        message: "Modo trabajo activado"

  41:
    name: "Script local"
    type: simple
    command: "src/static/scripts/mi_script.sh"
