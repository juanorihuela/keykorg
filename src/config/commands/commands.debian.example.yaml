# Archivo raíz de comandos para Debian.
# Solo lista los archivos a importar — no define pads directamente.
# Cada archivo en debian/ agrupa pads por categoría.
#
# Para crear tu configuración real:
#   1. Copia este archivo como commands.debian.yaml
#   2. Crea tus archivos de escenario en debian/ (sin .example en el nombre)
#   3. Ajusta la lista de imports según los archivos que uses
#
# Ver ejemplos de escenarios en debian/commands_example/

imports:
  - debian/apps.yaml
  - debian/sistema.yaml
  - debian/modos.yaml
